name: build-qt5-wdk7

# Builds Qt 5.6.3 (qtbase) with the WDK 7.1 toolchain so the output depends only
# on the system msvcrt.dll (Windows XP compatible, no VC redistributable), then
# publishes CMake-consumable packages.
#
# Stages (modeled on the z3 floating-release pattern):
#   1. version  - compute the alias (v5.6.3) and versioned (v5.6.3.<build>) tags.
#   2. build    - matrix of arch x link (i386/amd64 x shared/static) prebuilt pkgs.
#   3. release  - immutable per-build release on v5.6.3.<build> (marked latest) and
#                 a rolling alias release/tag v5.6.3 whose asset names DROP the
#                 build number, giving downstream stable FetchContent URLs:
#                   releases/download/v5.6.3/qt-wdk7-<link>-<arch>.zip
#
# Toolchain comes from tinysec/setup-wdk7 (WDK 7.1 on a hosted runner; no Visual
# Studio / self-hosted runner). cl 15.00 = the VS2008 SP1 compiler. Platform is
# Windows-only by nature; "multi-platform" here means the i386/amd64 arch matrix.

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_MAJOR: "5"
  VERSION_MINOR: "6"
  VERSION_PATCH: "3"

jobs:
  # 1. Compute version strings once and share them.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      alias: ${{ steps.compute.outputs.alias }}
    steps:
      - name: Compute version strings
        id: compute
        run: |
          ALIAS="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          VERSION="${ALIAS}.${GITHUB_RUN_NUMBER}"
          echo "alias=${ALIAS}"   >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Alias tag:     ${ALIAS}"
          echo "Versioned tag: ${VERSION}"

  # 2. Build the prebuilt variants. Each (arch, link) is its own parallel job.
  build:
    needs: version
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [ i386, amd64 ]
        link: [ shared, static ]
    env:
      QT_ARCH: ${{ matrix.arch }}
      QT_LINK: ${{ matrix.link }}
    steps:
      - name: Checkout (sources are vendored, no submodule init needed)
        uses: actions/checkout@v4

      - name: Setup WDK 7.1 toolchain
        uses: tinysec/setup-wdk7@v1

      - name: Configure + build qtbase (${{ matrix.arch }} ${{ matrix.link }})
        shell: cmd
        run: call hack\wdk-qt\clean-build.bat

      - name: Verify expected outputs
        shell: cmd
        run: |
          set "B=build-wdk-qtbase-%QT_ARCH%-%QT_LINK%"
          if /I "%QT_LINK%"=="shared" (
            if not exist "%B%\lib\Qt5Core.dll" exit /b 1
            if not exist "%B%\plugins\platforms\qwindows.dll" exit /b 1
          ) else (
            if not exist "%B%\lib\Qt5Core.lib" exit /b 1
            if not exist "%B%\plugins\platforms\qwindows.lib" exit /b 1
          )
          echo OK

      - name: Install (+ patch static CMake deps)
        shell: cmd
        run: call hack\wdk-qt\install.bat

      - name: Build qtcharts (into the same prefix)
        shell: cmd
        run: call hack\wdk-qt\build-qtcharts.bat

      - name: Verify zero-redist (no msvcr90/msvcp90)
        shell: pwsh
        run: |
          $root = if ($env:WDK7_ROOT) { $env:WDK7_ROOT } else { $env:W7BASE }
          $link = "$root\bin\x86\x86\link.exe"
          $b = "build-wdk-qtbase-$env:QT_ARCH-$env:QT_LINK"
          if ($env:QT_LINK -eq "shared") { $t = "$b\lib\Qt5Core.dll" } else { $t = "$b\lib\Qt5Core.lib" }
          $imports = & $link /dump /imports $t 2>&1 | Select-String -Pattern '\.dll'
          $imports
          if ($imports -match 'msvcr90|msvcp90') { Write-Error 'VC runtime dependency found!'; exit 1 }
          Write-Output 'OK: no msvcr90/msvcp90 dependency.'

      - name: Package (versioned asset name; install prefix at archive root)
        shell: pwsh
        run: |
          $name = "qt-${{ needs.version.outputs.version }}-wdk7-$env:QT_LINK-$env:QT_ARCH"
          $out = "$pwd\$name.zip"
          Push-Location "build-wdk-qtbase-$env:QT_ARCH-$env:QT_LINK\install"
          # -tzip writes a standard .zip so consumers need no 7-Zip to extract.
          7z a -tzip -mx=9 "$out" "*"
          Pop-Location
          Write-Output "Packaged $name.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qt-wdk7-${{ matrix.link }}-${{ matrix.arch }}
          path: qt-*.zip

  # 3. Publish the immutable versioned release and re-point the floating alias.
  release:
    needs: [ version, build ]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish versioned release + refresh floating alias
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          ALIAS: ${{ needs.version.outputs.alias }}
        run: |
          set -euo pipefail

          # 1. Immutable per-build release on v5.6.3.<build>, kept as "latest".
          #    Assets keep the build number (qt-v5.6.3.7-wdk7-shared-i386.zip).
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes "Automated WDK7 build of Qt ${ALIAS#v} (build ${GITHUB_RUN_NUMBER}). i386/amd64 x shared/static; depends only on the system msvcrt.dll." \
            --latest \
            $(find dist -type f | sort)

          # 2. Force-move the 3-part alias tag to this commit.
          git tag --force "${ALIAS}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${ALIAS}"

          # 3. Rolling alias release: asset names DROP the build number so the
          #    download URLs are stable across builds, e.g.
          #    releases/download/v5.6.3/qt-wdk7-shared-i386.zip. Not marked latest.
          mkdir -p alias
          for f in $(find dist -type f); do
            base="$(basename "${f}")"
            cp "${f}" "alias/qt-${base#qt-${VERSION}-}"
          done

          gh release delete "${ALIAS}" --yes --cleanup-tag=false || true
          gh release create "${ALIAS}" \
            --target "${GITHUB_SHA}" \
            --title "${ALIAS} (latest: ${VERSION})" \
            --notes "Rolling release tracking the latest WDK7 Qt build (currently ${VERSION}). Asset names are stable across builds for fixed FetchContent URLs." \
            --latest=false \
            $(find alias -type f | sort)
