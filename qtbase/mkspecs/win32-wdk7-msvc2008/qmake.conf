#
# qmake configuration for win32-msvc2008-wdk
#
# Builds Qt with the WDK 7.1 toolchain (cl 15.00 = VS2008 SP1) so the
# binaries depend only on the system msvcrt.dll (no msvcr90/msvcp90, no
# redistributable). The C++ standard library is linked statically while the
# C runtime is the dynamic system msvcrt.dll.
#
# Environment (INCLUDE/LIB/PATH) is provided by hack/wdk-qt/wdk-env.bat.
#

MSC_VER                 = 1500
MSVC_VER                = 9.0

include(../common/msvc-desktop.conf)

# WDK7 system-msvcrt.dll C++ recipe (validated by hack/wdk-probe).
# -FI force-includes the CRT compatibility shims into every translation unit.
QMAKE_CFLAGS           += -GS -D_STL70_ -D_STATIC_CPPLIB -D_DLL=1 -D_MT=1 -FI$$PWD/wdk-compat.h
QMAKE_CXXFLAGS         += -GS -D_STL70_ -D_STATIC_CPPLIB -D_DLL=1 -D_MT=1 -FI$$PWD/wdk-compat.h \
                          -wd4290 -wd4244 -wd4245 -wd4146 -wd4018 -wd4267

# Static C++ lib (ntstc_msvcrt) + dynamic system C runtime (msvcrt).
# Suppress all SxS manifests so no VC90.CRT dependency is embedded.
QMAKE_LFLAGS          += /MANIFEST:NO /NODEFAULTLIB:msvcrtd \
                          /DEFAULTLIB:ntstc_msvcrt /DEFAULTLIB:msvcrt \
                          /NODEFAULTLIB:comsupp

# comdef.h auto-links comsupp.lib (not in the WDK), but only inline _com_error
# members are used, so no comsupp symbol is actually referenced. Suppress it.

# Drop the Common-Controls manifest dependency (conflicts with /MANIFEST:NO).
QMAKE_LFLAGS_EXE        =

# No manifests at all (we want zero SxS dependency), so skip the mt.exe embed
# steps -- mt.exe is not part of the WDK toolchain anyway.
CONFIG                 -= embed_manifest_dll embed_manifest_exe

# Disable precompiled headers: nmake does not track the -FI force-included
# wdk-compat.h, so a stale PCH would mask shim changes. Without PCH every TU
# reads the current wdk-compat.h directly.
CONFIG                 -= precompile_header

load(qt_config)
